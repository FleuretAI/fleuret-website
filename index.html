<!doctype html>
<html lang="fr">
  <head>
    <!-- Consent defaults: MUST run before any tag fires (RGPD / ePrivacy).
         Stays in <head> so the deferred analytics blocks at the body end
         always see analytics_storage=denied at boot. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fleuret AI" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Fallback title. Each route overrides via react-helmet-async, and the
         prerender step bakes per-route titles into the static HTML. -->
    <title>Fleuret | Pentest automatisé par IA agentique</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Font: Lufga, self-hosted (Lighthouse W9 P3 2026-05-17). Eliminates
         the cross-origin round-trip to fonts.cdnfonts.com — DNS + TLS +
         transfer collapse into the same connection as the HTML doc. Only
         the 5 weights actually used in the codebase ship (audited via
         grep). LufgaLight = LCP weight (hero h1), LufgaRegular = body
         weight, both preloaded with crossorigin so the browser begins the
         fetch in parallel with stylesheet parse instead of after
         @font-face discovery. -->
    <link
      rel="preload"
      as="font"
      type="font/woff"
      href="/fonts/LufgaLight.woff"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff"
      href="/fonts/LufgaRegular.woff"
      crossorigin
    />
    <link rel="stylesheet" href="/fonts/lufga.css" />

    <!-- DNS preconnect for the analytics tags loaded at body end. Drops
         TLS handshake cost off the critical path so the deferred scripts
         hydrate fast once parsed. -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://www.clarity.ms" crossorigin />
  </head>

  <body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Analytics block — moved from <head> to body end (Lighthouse W9 audit
         2026-05-17). All tags previously sat in <head> and accounted for
         ~1.76s of render-blocking work + 427 KB of unused JS on mobile.
         Consent defaults still fire from <head> above; events captured via
         `dataLayer` survive the deferral because `dataLayer = []` is
         initialised in <head> and the tags drain the queue when they load.

         GTM intentionally NOT loaded here (Playwright audit 2026-05-17/18 on
         prod proved a dual-pipe gtag.js + GTM setup double-fires every GA4
         event — GTM auto-creates a "Google tag" entity that mirrors gtag.js
         and reinjects `gtag/js?id=G-GCT3NK4C34` with `&cx=c&gtm=...` even
         when the Tags list is empty. Plus the prerender step bakes the
         dynamically-injected gtm.js <script> element into the static HTML,
         then the inline boot re-executes on hydration = a second gtm.js
         load. Re-introduce GTM only when the first real marketing tag is
         needed (LinkedIn Insight, Meta Pixel, etc.) and pair it with the
         3-button consent banner required by TODOS.md #4 CNIL policy. -->

    <!-- Google Analytics 4 (gtag.js). Boots with analytics_storage=denied per
         the gtag('consent','default') block in <head> above.
         src/components/Analytics.tsx bridges the cookie banner: on accept it
         fires consent 'update' to granted; before that GA4 sends anonymized,
         cookieless pings (Consent Mode v2). Analytics.tsx also emits SPA
         page_view on route change. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GCT3NK4C34"></script>
    <script>
      // Opt-in DebugView: append ?debug_mode=1 to any URL to stream hits into
      // GA4 DebugView (Admin > DebugView). Normal visitors stay unaffected.
      var __ga4_debug = /[?&]debug_mode=1\b/.test(window.location.search);
      gtag('js', new Date());
      gtag('config', 'G-GCT3NK4C34', {
        'anonymize_ip': true,
        'cookie_flags': 'SameSite=None;Secure',
        'debug_mode': __ga4_debug
      });
    </script>

    <!-- Microsoft Clarity (heatmaps + session recordings, free). Loads
         cookieless by default; src/components/Analytics.tsx upgrades to
         cookie-based tracking via clarity('consent') after the cookie
         banner is accepted. RGPD-compliant when paired with the consent
         bridge. -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wrwrt0esfs");
    </script>
  </body>
</html>
