#
# nginx.conf — used ONLY by the Dockerfile-based deployment (oven/bun build
# stage -> nginx:alpine serve stage). Production serves from Vercel, which
# ignores nginx; the authoritative security headers for prod live in
# vercel.json at the repo root. Keep both in sync if you change one.
#

server {
    listen ${PORT};
    server_name localhost;
    root /app/www;
    server_tokens off;

    # --- Security headers (mirrors vercel.json) ---
    # Prevent clickjacking (deny iframe embedding entirely; SPA doesn't need framing)
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Control referrer leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Lock down powerful browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=()" always;
    # HSTS: 2 years, include subdomains, preload-eligible
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Content Security Policy
    # GA4 uses rotating collection endpoints (region1.analytics.google.com,
    # *.analytics.google.com, stats.g.doubleclick.net). cdnfonts serves woff2
    # from arbitrary subpaths so the wildcard is pragmatic.
    # - script-src: GTM/GA4 + inline bootstrap (gtag consent-default + JSON-LD)
    # - connect-src: Supabase fns + GA4 collection
    # - style-src / font-src: Lufga font CDN (*.cdnfonts.com) + inline
    # - img-src: GA4 beacon pixels
    # - frame-src: GTM only
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline' https://*.cdnfonts.com; font-src 'self' data: https://*.cdnfonts.com; img-src 'self' data: https://*.google-analytics.com https://*.g.doubleclick.net https://www.googletagmanager.com; connect-src 'self' https://*.supabase.co https://*.google-analytics.com https://*.analytics.google.com https://stats.g.doubleclick.net https://www.google.com; frame-src https://www.googletagmanager.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # --- Compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # Cache static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
