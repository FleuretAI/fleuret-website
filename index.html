<!doctype html>
<html lang="fr">
  <head>
    <!-- Consent defaults: MUST run before any tag fires (RGPD / ePrivacy) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    </script>

    <!-- Google Tag Manager -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-W5JB9N2K');
    </script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fleuret AI" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Fallback title. Each route overrides via react-helmet-async, and the
         prerender step bakes per-route titles into the static HTML. -->
    <title>Fleuret | Pentest automatisé par IA agentique</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Font: Lufga -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/lufga" />

    <!-- Google Analytics 4 (gtag.js). Boots with analytics_storage=denied per the
         gtag('consent','default') block above. src/components/Analytics.tsx
         bridges the cookie banner: on accept it fires consent 'update' to
         granted; before that GA4 sends anonymized, cookieless pings (Consent
         Mode v2). Analytics.tsx also emits SPA page_view on route change. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GCT3NK4C34"></script>
    <script>
      // Opt-in DebugView: append ?debug_mode=1 to any URL to stream hits into
      // GA4 DebugView (Admin > DebugView). Normal visitors stay unaffected.
      var __ga4_debug = /[?&]debug_mode=1\b/.test(window.location.search);
      gtag('js', new Date());
      gtag('config', 'G-GCT3NK4C34', {
        'anonymize_ip': true,
        'cookie_flags': 'SameSite=None;Secure',
        'debug_mode': __ga4_debug
      });
    </script>

    <!-- Microsoft Clarity (heatmaps + session recordings, free). Loads
         cookieless by default; src/components/Analytics.tsx upgrades to
         cookie-based tracking via clarity('consent') after the cookie
         banner is accepted. RGPD-compliant when paired with the consent
         bridge. -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wrwrt0esfs");
    </script>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-W5JB9N2K"
        height="0"
        width="0"
        style="display:none;visibility:hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
