server {
    listen ${PORT};
    server_name localhost;
    root /app/www;
    server_tokens off;

    # --- Security headers ---
    # Prevent clickjacking (deny iframe embedding entirely; SPA doesn't need framing)
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Control referrer leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Lock down powerful browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=()" always;
    # HSTS: 2 years, include subdomains, preload-eligible
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Content Security Policy
    # - script-src: GTM/GA4 + Axeptio CMP + Cloudflare Turnstile + inline for bootstrap snippets
    # - connect-src: Supabase edge functions + GA4 collection + Axeptio API + Turnstile
    # - style-src: Lufga font CDN + inline for Axeptio widget styles
    # - frame-src: GTM + Turnstile challenge iframe
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://static.axept.io https://*.axept.io https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.cdnfonts.com; font-src 'self' data: https://fonts.cdnfonts.com; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://*.axept.io https://api.axept.io https://challenges.cloudflare.com; frame-src https://www.googletagmanager.com https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # --- Compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # Cache static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
