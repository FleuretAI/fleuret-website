name: deno-test

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deno-test.yml"
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Run edge-function unit tests
        run: deno test --allow-env --allow-net supabase/functions/_shared/
